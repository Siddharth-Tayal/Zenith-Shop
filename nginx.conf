# Mandatory events block
events {
    worker_connections 1024;
}

http {
    # Rate limiting setup
    limit_req_zone $binary_remote_addr zone=mylimit:10m rate=100r/m;

    include       mime.types;
    default_type  application/octet-stream;

    server {
        listen 5000;
        server_name localhost;

        # Global Security Headers (Replacement for Helmet)
        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options DENY;
        add_header X-XSS-Protection "1; mode=block";

        # --- 2. RATE LIMITING ---
        limit_req zone=mylimit burst=20 nodelay;
        limit_req_status 429;

        # --- 3. AUTHENTICATION (The Middleware) ---
        # This route hits your Auth Service's validation logic
        location /internal-auth-check {
            internal;
            # Note: No trailing slash after validate
            proxy_pass http://localhost:3001/validate;

            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Original-URI $request_uri;
        }

        # --- 4. PROXY ROUTES ---

        # Auth Service (No trailing slashes ensures no 301 redirects)
        location /api/auth/ {
            proxy_pass http://localhost:3001/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Products Service
        location /api/products/ {
            auth_request /internal-auth-check;

            proxy_pass http://localhost:3002/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Optional: Pass User ID back to service if your Auth Service sends X-User-Id
            auth_request_set $user_id $upstream_http_x_user_id;
            proxy_set_header X-User-Id $user_id;
        }

        # Orders Service
        location /api/orders/ {
            auth_request /internal-auth-check;

            proxy_pass http://localhost:3003/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Error Handling
        error_page 504 /custom_504.json;
        location = /custom_504.json {
            return 504 '{"error": "Service Unreachable"}';
            add_header Content-Type application/json;
        }
    }
}